name: Update progress SVG

on:
  push:
    paths:
      - "progress.json"
      - "scripts/generate-progress.js"
  workflow_dispatch: {}  

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate SVG
        run: node scripts/generate-progress.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/progress.svg
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update progress SVG"
          git push
